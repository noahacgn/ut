name: uniqlo-price-watch

on:
  workflow_dispatch:
  schedule:
    - cron: '5 9 * * *'
      timezone: 'Asia/Shanghai'

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      UNIQLO_MAIL_FROM: ${{ vars.UNIQLO_MAIL_FROM }}
      UNIQLO_MAIL_TO: ${{ vars.UNIQLO_MAIL_TO }}
      UNIQLO_QQ_SMTP_AUTH_CODE: ${{ secrets.UNIQLO_QQ_SMTP_AUTH_CODE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Run monitor
        run: python scripts/uniqlo_price_watch.py

      - name: Detect state changes
        id: state
        run: |
          if git diff --quiet -- state/uniqlo_ut_l_alerted.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated state
        if: steps.state.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add state/uniqlo_ut_l_alerted.json
          git commit -m 'chore(state): update uniqlo ut alert state'
          git push
